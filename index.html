<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Image Gallery</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Image Gallery</h1>

<div class="filters">
    <button class="active" onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
    <button onclick="filterImages('animals')">Animals</button>
</div>

<div class="gallery">

    <div class="image nature">
        <img src="https://picsum.photos/id/1015/600/400" onclick="openLightbox(0)">
    </div>

    <div class="image city">
        <img src="https://picsum.photos/id/1011/600/400" onclick="openLightbox(1)">
    </div>

    <div class="image animals">
        <img src="https://picsum.photos/id/1025/600/400" onclick="openLightbox(2)">
    </div>

    <div class="image nature">
        <img src="https://picsum.photos/id/1039/600/400" onclick="openLightbox(3)">
    </div>

    <div class="image city">
        <img src="https://picsum.photos/id/1043/600/400" onclick="openLightbox(4)">
    </div>

    <div class="image animals">
        <img src="https://picsum.photos/id/237/600/400" onclick="openLightbox(5)">
    </div>

</div>

<!-- Lightbox -->

<div id="lightbox">

<span class="close" onclick="closeLightbox()">&times;</span>

<button class="prev" onclick="changeImage(-1)">&#10094;</button>

<img id="lightbox-img">

<button class="next" onclick="changeImage(1)">&#10095;</button>

</div>

<script src="script.js"></script>

</body>
</html>
